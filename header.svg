<svg width="500" height="80" viewBox="0 0 500 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .f { font-family: "Courier New", Courier, monospace; font-weight: bold; }
      .blink { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .t1 { animation: cycle 6s 0s step-end infinite; }
      .t2 { animation: cycle 6s 1.2s step-end infinite; }
      .t3 { animation: cycle 6s 2.4s step-end infinite; }
      .t4 { animation: cycle 6s 3.6s step-end infinite; }
      .t5 { animation: cycle 6s 4.8s step-end infinite; }
    </style>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Dark background box -->
  <rect x="1" y="1" width="498" height="78" rx="8" fill="#0D1117"
        stroke="#21262D" stroke-width="1" filter="url(#shadow)"/>

  <!-- Subtle cyan border glow -->
  <rect x="1" y="1" width="498" height="78" rx="8" fill="none"
        stroke="#00FFFF" stroke-width="1" opacity="0.2"/>

  <!-- Centered typing text via foreignObject isn't supported; use image inside instead -->
  <!-- We just host the typing SVG as an image centered in the box -->
  <image href="https://readme-typing-svg.demolab.com?font=Fira+Code&amp;weight=600&amp;size=20&amp;pause=1200&amp;color=00FFFF&amp;center=true&amp;vCenter=true&amp;width=460&amp;height=60&amp;lines=Shrutik+KaPatel;Embedded+Firmware+Engineer;Bare-Metal+STM32+%7C+ARM+Cortex-M4;UART+%7C+SPI+%7C+I2C+%7C+DMA;Open+to+Firmware+Roles"
        x="20" y="10" width="460" height="60"/>
</svg>