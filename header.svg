<svg width="500" height="80" viewBox="0 0 500 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect x="1" y="1" width="498" height="78" rx="8" fill="#0D1117"
        stroke="#21262D" stroke-width="1" filter="url(#shadow)"/>
  <!-- Cyan border glow -->
  <rect x="1" y="1" width="498" height="78" rx="8" fill="none"
        stroke="#00FFFF" stroke-width="1" opacity="0.25"/>

  <text x="250" y="50" text-anchor="middle" dominant-baseline="middle"
        font-family="Courier New, Courier, monospace" font-size="19" font-weight="bold" fill="#00FFFF"
        opacity="0">
    <animate attributeName="opacity"
      values="0;1;1;0"
      keyTimes="0;0.0000;0.1864;0.2000"
      dur="11.0s" repeatCount="indefinite"/>
    Shrutik KaPatel
  </text>  <text x="250" y="50" text-anchor="middle" dominant-baseline="middle"
        font-family="Courier New, Courier, monospace" font-size="19" font-weight="bold" fill="#00FFFF"
        opacity="0">
    <animate attributeName="opacity"
      values="0;1;1;0"
      keyTimes="0;0.2000;0.3864;0.4000"
      dur="11.0s" repeatCount="indefinite"/>
    Embedded Firmware Engineer
  </text>  <text x="250" y="50" text-anchor="middle" dominant-baseline="middle"
        font-family="Courier New, Courier, monospace" font-size="19" font-weight="bold" fill="#00FFFF"
        opacity="0">
    <animate attributeName="opacity"
      values="0;1;1;0"
      keyTimes="0;0.4000;0.5864;0.6000"
      dur="11.0s" repeatCount="indefinite"/>
    Bare-Metal STM32  |  ARM Cortex-M4
  </text>  <text x="250" y="50" text-anchor="middle" dominant-baseline="middle"
        font-family="Courier New, Courier, monospace" font-size="19" font-weight="bold" fill="#00FFFF"
        opacity="0">
    <animate attributeName="opacity"
      values="0;1;1;0"
      keyTimes="0;0.6000;0.7864;0.8000"
      dur="11.0s" repeatCount="indefinite"/>
    UART  |  SPI  |  I2C  |  DMA
  </text>  <text x="250" y="50" text-anchor="middle" dominant-baseline="middle"
        font-family="Courier New, Courier, monospace" font-size="19" font-weight="bold" fill="#00FFFF"
        opacity="0">
    <animate attributeName="opacity"
      values="0;1;1;0"
      keyTimes="0;0.8000;0.9864;1.0000"
      dur="11.0s" repeatCount="indefinite"/>
    Open to Firmware Roles
  </text>
</svg>